<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LUNERGY — Moon Base Survival</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#05030f;
    --bg-night:#0a0a2a;
    --purple:#2a1a5e;
    --purple-bright:#6a4cff;
    --blue-dark:#0e1a4a;
    --blue:#2a4cff;
    --gold:#ffcc33;
    --gold-bright:#ffe066;
    --red:#ff4d4d;
    --green:#33ff88;
    --cyan:#66e0ff;
    --white:#f5f5ff;
    --grid:#1a1640;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    width:100%; height:100%;
    background:#000;
    font-family:'Press Start 2P', monospace;
    color:var(--white);
    overflow:hidden;
    image-rendering:pixelated;
    -webkit-font-smoothing:none;
    -moz-osx-font-smoothing:none;
  }
  /* Letterbox stage that scales the 1280x800 canvas to fit */
  #stage{
    position:fixed; inset:0;
    background:#000;
    display:flex; align-items:center; justify-content:center;
  }
  #game{
    width:1280px; height:800px;
    position:relative;
    transform-origin:center center;
    background:var(--bg-deep);
    overflow:hidden;
    image-rendering:pixelated;
    box-shadow:0 0 60px rgba(106,76,255,0.15) inset;
  }
  canvas{ image-rendering:pixelated; display:block; }
  .pixel{ image-rendering:pixelated; }

  /* CRT scanlines overlay */
  #game::after{
    content:"";
    position:absolute; inset:0;
    background:
      repeating-linear-gradient(
        to bottom,
        rgba(0,0,0,0) 0px,
        rgba(0,0,0,0) 2px,
        rgba(0,0,0,0.18) 3px,
        rgba(0,0,0,0.18) 4px
      );
    pointer-events:none;
    z-index:999;
    mix-blend-mode:multiply;
  }
  #game::before{
    content:"";
    position:absolute; inset:0;
    background:radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.7) 100%);
    pointer-events:none;
    z-index:998;
  }

  #root{ width:100%; height:100%; position:relative; z-index:1; }

  /* Pixel-perfect button */
  .pxbtn{
    font-family:'Press Start 2P', monospace;
    font-size:14px;
    color:var(--white);
    background:var(--purple);
    border:none;
    padding:14px 22px;
    cursor:pointer;
    position:relative;
    box-shadow:
      0 4px 0 0 #1a0d3d,
      inset -3px -3px 0 0 rgba(0,0,0,0.4),
      inset 3px 3px 0 0 rgba(255,255,255,0.15);
    transition:transform 0.05s, box-shadow 0.05s;
    letter-spacing:1px;
    text-transform:uppercase;
  }
  .pxbtn:hover{ background:var(--purple-bright); }
  .pxbtn:active{
    transform:translateY(3px);
    box-shadow:
      0 1px 0 0 #1a0d3d,
      inset -3px -3px 0 0 rgba(0,0,0,0.4),
      inset 3px 3px 0 0 rgba(255,255,255,0.15);
  }
  .pxbtn.gold{
    background:var(--gold);
    color:#2a1a00;
    box-shadow:
      0 4px 0 0 #8a6a00,
      inset -3px -3px 0 0 rgba(0,0,0,0.25),
      inset 3px 3px 0 0 rgba(255,255,255,0.4);
  }
  .pxbtn.gold:hover{ background:var(--gold-bright); }

  /* Pixel panel */
  .panel{
    background:var(--bg-night);
    border:4px solid var(--purple-bright);
    box-shadow:
      0 0 0 4px #0a0a2a,
      0 0 0 8px var(--purple),
      inset 0 0 0 0 transparent;
    image-rendering:pixelated;
  }

  /* Marquee blink */
  @keyframes blink {
    0%,49%{opacity:1;} 50%,100%{opacity:0;}
  }
  .blink{ animation:blink 1s steps(1,end) infinite; }

  @keyframes blink-slow {
    0%,70%{opacity:1;} 71%,100%{opacity:0.3;}
  }

  @keyframes pulse-glow {
    0%,100%{ filter:brightness(1) drop-shadow(0 0 8px var(--gold)); }
    50%{ filter:brightness(1.3) drop-shadow(0 0 16px var(--gold-bright)); }
  }
  .pulse-glow{ animation:pulse-glow 1.5s ease-in-out infinite; }

  @keyframes shake {
    0%,100%{transform:translate(0,0);}
    20%{transform:translate(-2px,1px);}
    40%{transform:translate(2px,-1px);}
    60%{transform:translate(-1px,2px);}
    80%{transform:translate(1px,-2px);}
  }
  .shake{ animation:shake 0.3s linear; }

  @keyframes star-twinkle {
    0%,100%{opacity:0.3;}
    50%{opacity:1;}
  }

  /* Energy bar */
  .bar-frame{
    background:#000;
    border:3px solid var(--white);
    padding:3px;
    height:32px;
    position:relative;
  }
  .bar-fill{
    height:100%;
    background:linear-gradient(to right,
      var(--green) 0%, var(--green) 30%,
      var(--gold) 50%, var(--red) 100%);
    background-size:200% 100%;
    transition:width 0.3s linear;
    position:relative;
  }
  .bar-segs{
    position:absolute; inset:0;
    background:repeating-linear-gradient(
      to right,
      transparent 0px, transparent 22px,
      rgba(0,0,0,0.6) 22px, rgba(0,0,0,0.6) 24px
    );
    pointer-events:none;
  }

  /* Source card */
  .source-card{
    background:var(--bg-night);
    border:3px solid var(--blue);
    padding:10px;
    cursor:pointer;
    position:relative;
    transition:all 0.1s;
    user-select:none;
  }
  .source-card:hover{ border-color:var(--gold); transform:translateY(-2px); }
  .source-card.active{
    border-color:var(--gold);
    background:linear-gradient(180deg, #2a1f0f 0%, var(--bg-night) 100%);
    box-shadow:0 0 16px rgba(255,204,51,0.4);
  }
  .source-card.disabled{
    opacity:0.4;
    cursor:not-allowed;
    border-color:#444;
  }
  .source-card.disabled:hover{ transform:none; border-color:#444; }

  /* Condition pill */
  .pill{
    display:inline-flex; align-items:center; gap:6px;
    padding:6px 10px;
    background:var(--bg-night);
    border:2px solid var(--purple-bright);
    font-size:10px;
  }

  /* tiny font for inline body */
  .vt{ font-family:'VT323', monospace; font-weight:normal; letter-spacing:0.5px; }

  /* Toast for educational facts */
  @keyframes toast-in {
    0%{ transform:translateY(20px); opacity:0; }
    100%{ transform:translateY(0); opacity:1; }
  }
  .toast{ animation:toast-in 0.3s ease-out; }

  /* Game over flash */
  @keyframes red-flash {
    0%,100%{ background:rgba(255,0,0,0); }
    50%{ background:rgba(255,0,0,0.3); }
  }
  .red-flash{ animation:red-flash 0.4s ease-in-out 3; }

  /* Scrollbar */
  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-track{ background:#0a0a2a; }
  ::-webkit-scrollbar-thumb{ background:var(--purple-bright); }
</style>
</head>
<body>
  <div id="stage">
    <div id="game">
      <canvas id="bg-canvas" width="1280" height="800" style="position:absolute; inset:0; z-index:0;"></canvas>
      <div id="root"></div>
    </div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script>
    // Scale 1280x800 canvas to viewport
    function fit(){
      const g = document.getElementById('game');
      const s = Math.min(window.innerWidth/1280, window.innerHeight/800);
      g.style.transform = `scale(${s})`;
    }
    window.addEventListener('resize', fit);
    fit();
  </script>

  <script src="bg.js"></script>
  <script type="text/babel" src="game.jsx"></script>
</body>
</html>
